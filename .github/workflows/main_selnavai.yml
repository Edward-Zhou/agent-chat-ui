# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - selnavai

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v3
        with:
          node-version: '22.x'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Build all apps with turbo
        run: pnpm build

      - name: Create zip of build output
        # Package the .next folder into a single zip so deployment receives a single artifact file
        run: |
          if [ -d ".next" ]; then
            zip -r webapp.zip .next
          else
            echo ".next directory not found"
            exit 1
          fi

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: webapp
          path: webapp.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: webapp
          path: .

      - name: Show downloaded artifact for debugging
        run: |
          echo "Listing artifact contents:"
          ls -la
          ls -la ./webapp || true

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_2383AF0E75DF4B3B8FC3F84827516468 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_110A25F09C624C3CB5BD041736134B2D }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_961486436ECE45BAAF849DFF0362E1FA }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'selnavai'
          slot-name: 'Production'
          package: webapp.zip

